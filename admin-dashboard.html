<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - CR7 Clothing</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", sans-serif;
        background: #0a0a0a;
        color: #ffffff;
      }
      .admin-container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px;
      }
      .admin-header {
        background: #141414;
        padding: 20px 30px;
        border-radius: 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .admin-header h1 {
        color: #ff7a00;
        font-size: 24px;
      }
      .logout-btn {
        background: #ff4444;
        padding: 10px 24px;
        border: none;
        border-radius: 8px;
        color: white;
        cursor: pointer;
        font-weight: 600;
      }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }
      .stat-card {
        background: #141414;
        padding: 20px;
        border-radius: 16px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .stat-number {
        font-size: 32px;
        font-weight: 700;
        color: #ff7a00;
      }
      .tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 25px;
        flex-wrap: wrap;
      }
      .tab-btn {
        background: #141414;
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 12px 24px;
        border-radius: 40px;
        color: white;
        cursor: pointer;
      }
      .tab-btn.active {
        background: #ff7a00;
      }
      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
      }
      .product-form {
        background: #141414;
        padding: 25px;
        border-radius: 20px;
        margin-bottom: 30px;
      }
      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .form-group label {
        font-size: 13px;
        color: #aaa;
      }
      .form-group input,
      .form-group select,
      .form-group textarea {
        padding: 12px;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 12px;
        color: white;
      }
      .image-upload-area {
        border: 2px dashed #ff7a00;
        border-radius: 16px;
        padding: 30px;
        text-align: center;
        cursor: pointer;
        margin: 15px 0;
      }
      .image-preview {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 15px;
      }
      .preview-img {
        width: 80px;
        height: 80px;
        object-fit: cover;
        border-radius: 8px;
        border: 2px solid #ff7a00;
      }
      .submit-btn {
        background: #ff7a00;
        color: white;
        padding: 14px;
        border: none;
        border-radius: 40px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        margin-top: 10px;
      }

      /* Products Table - Fixed Alignment */
      .products-table {
        width: 100%;
        background: #141414;
        border-radius: 16px;
        overflow-x: auto;
      }
      .products-table h3 {
        padding: 20px 20px 0 20px;
        margin-bottom: 20px;
        color: #ff7a00;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      thead tr {
        background: #1a1a1a;
      }
      th {
        text-align: left;
        padding: 14px 12px;
        color: #ff7a00;
        font-weight: 600;
        font-size: 13px;
        border-bottom: 1px solid #333;
      }
      td {
        padding: 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        vertical-align: middle;
        font-size: 13px;
        color: #ccc;
      }
      .product-img-small {
        width: 45px;
        height: 45px;
        object-fit: cover;
        border-radius: 8px;
        display: block;
      }
      .edit-btn {
        background: #ff7a00;
        color: white;
        border: none;
        padding: 5px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
        margin-right: 5px;
      }
      .delete-btn {
        background: #ff4444;
        color: white;
        border: none;
        padding: 5px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
      }
      .edit-btn:hover {
        background: #e06600;
      }
      .delete-btn:hover {
        background: #cc0000;
      }

      .orders-table {
        width: 100%;
        background: #141414;
        border-radius: 16px;
        overflow-x: auto;
        padding: 0;
      }
      .orders-table h3 {
        padding: 20px 20px 0 20px;
        margin-bottom: 20px;
        color: #ff7a00;
      }

      .login-prompt {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
        padding: 20px;
      }
      .login-prompt-card {
        background: #141414;
        border-radius: 32px;
        padding: 50px 40px;
        text-align: center;
        max-width: 450px;
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .lock-icon {
        width: 80px;
        height: 80px;
        background: rgba(255, 122, 0, 0.15);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 25px;
        border: 2px solid rgba(255, 122, 0, 0.3);
      }
      .lock-icon i {
        font-size: 40px;
        color: #ff7a00;
      }
      .login-prompt-card h2 {
        font-size: 28px;
        font-weight: 700;
        color: white;
        margin-bottom: 12px;
      }
      .login-prompt-card p {
        color: #888;
        font-size: 14px;
        margin-bottom: 30px;
      }
      .login-prompt-btn {
        background: #ff7a00;
        color: white;
        border: none;
        padding: 14px 28px;
        border-radius: 40px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
      }
      .back-to-store {
        display: block;
        color: #666;
        text-decoration: none;
        font-size: 14px;
        margin-top: 20px;
      }

      @media (max-width: 768px) {
        .form-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="loginPrompt" class="login-prompt">
      <div class="login-prompt-card">
        <div class="lock-icon"><i class="fas fa-shield-alt"></i></div>
        <h2>Admin Access Required</h2>
        <p>Please login to access Admin Dashboard</p>
        <button
          class="login-prompt-btn"
          onclick="window.location.href = 'admin-login.html'"
        >
          Login as Admin →
        </button>
        <a href="/" class="back-to-store">← Return to Store</a>
      </div>
    </div>

    <div id="adminContent" style="display: none">
      <div class="admin-container">
        <div class="admin-header">
          <h1><i class="fas fa-crown"></i> CR7 Admin Dashboard</h1>
          <button class="logout-btn" id="logoutBtn">
            <i class="fas fa-sign-out-alt"></i> Logout
          </button>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-number" id="totalProducts">0</div>
            <div>Total Products</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="totalOrders">0</div>
            <div>Total Orders</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="totalCustomers">0</div>
            <div>Total Customers</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="totalSales">$0</div>
            <div>Total Sales</div>
          </div>
        </div>

        <div class="tabs">
          <button class="tab-btn active" data-tab="products">
            📦 Manage Products
          </button>
          <button class="tab-btn" data-tab="add">✨ Add New Product</button>
          <button class="tab-btn" data-tab="orders">📋 Orders</button>
          <button class="tab-btn" data-tab="customers">👥 Customers</button>
        </div>

        <div id="products-tab" class="tab-content active">
          <div class="products-table">
            <h3>📦 All Products</h3>
            <div id="productsList"></div>
          </div>
        </div>

        <div id="add-tab" class="tab-content">
          <div class="product-form">
            <h3 style="margin-bottom: 20px">✨ Add New Product</h3>
            <div class="form-grid">
              <div class="form-group">
                <label>Product Name</label
                ><input
                  type="text"
                  id="prodName"
                  placeholder="Enter product name"
                />
              </div>
              <div class="form-group">
                <label>Price ($)</label
                ><input type="number" id="prodPrice" placeholder="0.00" />
              </div>
              <div class="form-group">
                <label>Stock Quantity</label
                ><input
                  type="number"
                  id="prodStock"
                  placeholder="Enter stock"
                />
              </div>
              <div class="form-group">
                <label>Category</label
                ><select id="prodCategory">
                  <option value="men">Men</option>
                  <option value="women">Women</option>
                  <option value="accessories">Accessories</option>
                </select>
              </div>
            </div>

            <div class="image-upload-area" id="imageUploadArea">
              <i
                class="fas fa-cloud-upload-alt"
                style="font-size: 40px; color: #ff7a00"
              ></i>
              <p>Click or Drag & Drop Product Image</p>
              <input
                type="file"
                id="productImage"
                accept="image/*"
                style="display: none"
              />
            </div>
            <div id="imagePreview" class="image-preview"></div>

            <div class="form-group">
              <label>Description</label
              ><textarea
                id="prodDescription"
                rows="3"
                placeholder="Product description..."
              ></textarea>
            </div>
            <button id="addProductBtn" class="submit-btn">
              ➕ Add Product
            </button>
          </div>
        </div>

        <div id="orders-tab" class="tab-content">
          <div class="orders-table">
            <h3>📋 Customer Orders</h3>
            <div id="ordersList"></div>
          </div>
        </div>

        <div id="customers-tab" class="tab-content">
          <div class="orders-table">
            <h3>👥 Registered Customers</h3>
            <div id="customersList"></div>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import {
        getStorage,
        ref,
        uploadBytes,
        getDownloadURL,
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
      import {
        getFirestore,
        collection,
        getDocs,
        addDoc,
        updateDoc,
        deleteDoc,
        doc,
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBrXk_ltbvHPqbGnD_tIq8u9iNa_R3Bnlc",
        authDomain: "cr7-clothing-b4d5f.firebaseapp.com",
        projectId: "cr7-clothing-b4d5f",
        storageBucket: "cr7-clothing-b4d5f.firebasestorage.app",
        messagingSenderId: "671815729334",
        appId: "1:671815729334:web:d329c18205262c5221a617",
      };

      const app = initializeApp(firebaseConfig);
      const storage = getStorage(app);
      const db = getFirestore(app);

      let products = [],
        orders = [],
        customers = [];
      let selectedImageFile = null;

      // Check admin session
      const adminSession = localStorage.getItem("adminLoggedIn");

      if (adminSession !== "true") {
        // Not logged in - show login prompt
        document.getElementById("loginPrompt").style.display = "flex";
        document.getElementById("adminContent").style.display = "none";
      } else {
        // Logged in - show dashboard
        document.getElementById("loginPrompt").style.display = "none";
        document.getElementById("adminContent").style.display = "block";
        loadAllData();
      }

      const uploadArea = document.getElementById("imageUploadArea");
      const fileInput = document.getElementById("productImage");
      const imagePreview = document.getElementById("imagePreview");

      uploadArea.addEventListener("click", () => fileInput.click());
      uploadArea.addEventListener("dragover", (e) => {
        e.preventDefault();
        uploadArea.style.background = "rgba(255,122,0,0.1)";
      });
      uploadArea.addEventListener("dragleave", () => {
        uploadArea.style.background = "transparent";
      });
      uploadArea.addEventListener("drop", (e) => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith("image/")) handleImageFile(file);
      });
      fileInput.addEventListener("change", (e) => {
        if (e.target.files[0]) handleImageFile(e.target.files[0]);
      });

      function handleImageFile(file) {
        if (!file.type.startsWith("image/")) {
          alert("Please select an image file");
          return;
        }
        if (file.size > 5 * 1024 * 1024) {
          alert("Image size should be less than 5MB");
          return;
        }
        selectedImageFile = file;
        const reader = new FileReader();
        reader.onload = (e) => {
          imagePreview.innerHTML = `<img src="${e.target.result}" class="preview-img">`;
        };
        reader.readAsDataURL(file);
      }

      async function uploadImage() {
        if (!selectedImageFile)
          return "https://placehold.co/400x500/1a1a1a/ffffff?text=No+Image";
        const fileName = `products/${Date.now()}_${selectedImageFile.name}`;
        const imageRef = ref(storage, fileName);
        await uploadBytes(imageRef, selectedImageFile);
        return await getDownloadURL(imageRef);
      }

      async function addProductWithImage() {
        const name = document.getElementById("prodName").value.trim();
        const price = parseFloat(document.getElementById("prodPrice").value);
        const stock = parseInt(document.getElementById("prodStock").value);
        const category = document.getElementById("prodCategory").value;
        const description = document
          .getElementById("prodDescription")
          .value.trim();

        if (!name || isNaN(price)) {
          alert("Please fill product name and price");
          return;
        }

        const image = await uploadImage();
        await addDoc(collection(db, "products"), {
          name,
          price,
          stock: stock || 0,
          category,
          image,
          description,
          createdAt: new Date(),
        });

        alert(`✅ "${name}" added successfully!`);
        selectedImageFile = null;
        imagePreview.innerHTML = "";
        document.getElementById("prodName").value = "";
        document.getElementById("prodPrice").value = "";
        document.getElementById("prodStock").value = "";
        document.getElementById("prodDescription").value = "";
        loadAllData();
        switchTab("products");
      }

      async function loadAllData() {
        const ps = await getDocs(collection(db, "products"));
        products = ps.docs.map((d) => ({ id: d.id, ...d.data() }));
        const os = await getDocs(collection(db, "orders"));
        orders = os.docs.map((d) => ({ id: d.id, ...d.data() }));
        const cs = await getDocs(collection(db, "customers"));
        customers = cs.docs.map((d) => ({ id: d.id, ...d.data() }));
        displayProducts();
        displayOrders();
        displayCustomers();
        updateStats();
      }

      function displayProducts() {
        const container = document.getElementById("productsList");
        if (!container) return;
        if (products.length === 0) {
          container.innerHTML =
            "<p style='text-align:center; padding:40px;'>No products found.</p>";
          return;
        }

        let html = `<table><thead><tr>
        <th>Image</th><th>Name</th><th>Price</th><th>Stock</th><th>Category</th><th>Actions</th>
      </tr></thead><tbody>`;

        for (const p of products) {
          html += `<tr>
          <td><img src="${p.image || "https://placehold.co/50x50"}" class="product-img-small" onerror="this.src='https://placehold.co/50x50'"></td>
          <td>${p.name}</td>
          <td>$${p.price}</td>
          <td>${p.stock}</td>
          <td>${p.category}</td>
          <td><button class="edit-btn" onclick="editProduct('${p.id}')">Edit</button> <button class="delete-btn" onclick="deleteProduct('${p.id}')">Delete</button></td>
        </tr>`;
        }
        html += `</tbody></table>`;
        container.innerHTML = html;
      }

      function displayOrders() {
        const container = document.getElementById("ordersList");
        if (!container) return;
        if (orders.length === 0) {
          container.innerHTML =
            "<p style='text-align:center; padding:40px;'>No orders yet.</p>";
          return;
        }

        let html = `<table><thead><tr>
        <th>Order ID</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th>
      </tr></thead><tbody>`;

        for (const o of orders) {
          html += `<tr>
          <td>${o.id.substring(0, 8)}</td>
          <td>${o.customer?.name || "N/A"}</td>
          <td>${o.items?.map((i) => `${i.name} x${i.quantity}`).join(", ") || "N/A"}</td>
          <td>$${o.total || 0}</td>
          <td><span style="background:${o.status === "pending" ? "#f59e0b" : "#22c55e"}; padding:4px 12px; border-radius:20px; font-size:12px;">${o.status || "pending"}</span></td>
        </tr>`;
        }
        html += `</tbody></table>`;
        container.innerHTML = html;
      }

      function displayCustomers() {
        const container = document.getElementById("customersList");
        if (!container) return;
        if (customers.length === 0) {
          container.innerHTML =
            "<p style='text-align:center; padding:40px;'>No customers yet.</p>";
          return;
        }

        let html = `<table><thead><tr>
        <th>Name</th><th>Email</th><th>Phone</th>
      </tr></thead><tbody>`;

        for (const c of customers) {
          html += `<tr>
          <td>${c.fullName || "N/A"}</td>
          <td>${c.email || "N/A"}</td>
          <td>${c.phone || "N/A"}</td>
        </tr>`;
        }
        html += `</tbody></table>`;
        container.innerHTML = html;
      }

      function updateStats() {
        document.getElementById("totalProducts").innerText = products.length;
        document.getElementById("totalOrders").innerText = orders.length;
        document.getElementById("totalCustomers").innerText = customers.length;
        const totalSales = orders.reduce((s, o) => s + (o.total || 0), 0);
        document.getElementById("totalSales").innerText = `$${totalSales}`;
      }

      window.editProduct = async (id) => {
        const newName = prompt("Enter new product name:");
        if (newName) {
          await updateDoc(doc(db, "products", id), { name: newName });
          loadAllData();
        }
      };
      window.deleteProduct = async (id) => {
        if (confirm("Delete this product?")) {
          await deleteDoc(doc(db, "products", id));
          loadAllData();
        }
      };

      document
        .getElementById("addProductBtn")
        .addEventListener("click", addProductWithImage);
      document.getElementById("logoutBtn").addEventListener("click", () => {
        localStorage.removeItem("adminLoggedIn");
        window.location.href = "admin-login.html";
      });

      function switchTab(tabName) {
        document
          .querySelectorAll(".tab-btn")
          .forEach((b) => b.classList.remove("active"));
        document
          .querySelectorAll(".tab-content")
          .forEach((t) => t.classList.remove("active"));
        document
          .querySelector(`[data-tab="${tabName}"]`)
          .classList.add("active");
        document.getElementById(`${tabName}-tab`).classList.add("active");
      }
      document.querySelectorAll(".tab-btn").forEach((btn) => {
        btn.addEventListener("click", () => switchTab(btn.dataset.tab));
      });
    </script>
  </body>
</html>
