<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - CR7 Clothing</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", sans-serif;
        background: #0a0a0a;
        color: #fff;
      }
      .admin-container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px;
      }
      .admin-header {
        background: #141414;
        padding: 20px 30px;
        border-radius: 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
      }
      .admin-header h1 {
        color: #ff7a00;
      }
      .logout-btn {
        background: #ff4444;
        padding: 10px 24px;
        border: none;
        border-radius: 8px;
        color: white;
        cursor: pointer;
      }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }
      .stat-card {
        background: #141414;
        padding: 20px;
        border-radius: 16px;
        text-align: center;
      }
      .stat-number {
        font-size: 32px;
        font-weight: 700;
        color: #ff7a00;
      }
      .tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 25px;
        flex-wrap: wrap;
      }
      .tab-btn {
        background: #141414;
        border: 1px solid #333;
        padding: 12px 24px;
        border-radius: 40px;
        color: white;
        cursor: pointer;
      }
      .tab-btn.active {
        background: #ff7a00;
      }
      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
      }
      .product-form {
        background: #121212;
        border: 1px solid #222;
        padding: 35px;
        border-radius: 24px;
        margin-bottom: 30px;
      }
      .form-layout-grid {
        display: grid;
        grid-template-columns: 1.2fr 0.8fr;
        gap: 35px;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 15px;
      }
      .form-group input,
      .form-group select,
      .form-group textarea {
        padding: 14px 16px;
        background: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 12px;
        color: white;
      }
      .form-group input:focus {
        outline: none;
        border-color: #ff7a00;
      }
      .image-upload-area {
        border: 2px dashed #333;
        border-radius: 16px;
        padding: 40px 20px;
        text-align: center;
        cursor: pointer;
        background: #161616;
      }
      .submit-btn {
        background: linear-gradient(135deg, #ff9100 0%, #ff6200 100%);
        color: white;
        padding: 16px;
        border: none;
        border-radius: 14px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        width: 100%;
      }
      .products-table,
      .orders-table {
        width: 100%;
        overflow-x: auto;
        background: #141414;
        border-radius: 16px;
        padding: 20px;
        margin-top: 20px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        padding: 15px;
        text-align: left;
        border-bottom: 1px solid #333;
      }
      th {
        color: #ff7a00;
      }
      .product-img-small {
        width: 50px;
        height: 50px;
        object-fit: cover;
        border-radius: 8px;
        cursor: pointer;
      }
      .edit-btn,
      .delete-btn,
      .stock-btn {
        padding: 6px 14px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        margin: 0 4px;
      }
      .edit-btn {
        background: #ff7a00;
        color: white;
      }
      .delete-btn {
        background: #ff4444;
        color: white;
      }
      .stock-btn {
        background: #22c55e;
        color: white;
      }
      .edit-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        z-index: 10001;
        justify-content: center;
        align-items: center;
      }
      .edit-modal-content {
        background: #141414;
        border-radius: 24px;
        padding: 30px;
        width: 90%;
        max-width: 550px;
        max-height: 85vh;
        overflow-y: auto;
      }
      .modal-buttons {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }
      .save-btn {
        background: #ff7a00;
        color: white;
        border: none;
        padding: 12px;
        border-radius: 40px;
        flex: 1;
        cursor: pointer;
      }
      .cancel-btn {
        background: #333;
        color: white;
        border: none;
        padding: 12px;
        border-radius: 40px;
        flex: 1;
        cursor: pointer;
      }
      .upload-progress {
        display: none;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 14px;
        background: rgba(255, 122, 0, 0.08);
        border-radius: 12px;
      }
      .spinner {
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255, 122, 0, 0.2);
        border-top-color: #ff7a00;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* PREMIUM LOGIN PROMPT STYLES */
      .login-prompt {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10000;
      }

      .login-prompt-card {
        background: linear-gradient(135deg, #141414 0%, #0f0f0f 100%);
        border: 1px solid rgba(255, 122, 0, 0.2);
        border-radius: 32px;
        padding: 48px 40px;
        text-align: center;
        max-width: 420px;
        width: 90%;
        animation: fadeInUp 0.6s ease;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .login-logo {
        font-size: 48px;
        font-weight: 800;
        background: linear-gradient(135deg, #ff7a00, #ffaa33);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 16px;
      }

      .login-prompt-card h2 {
        font-size: 28px;
        font-weight: 700;
        color: #ffffff;
        margin-bottom: 12px;
      }

      .login-prompt-card p {
        color: #888;
        font-size: 14px;
        margin-bottom: 32px;
      }

      .login-prompt-btn {
        background: linear-gradient(135deg, #ff7a00, #e06600);
        color: white;
        border: none;
        padding: 14px 32px;
        border-radius: 40px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        transition: all 0.3s ease;
        margin-bottom: 16px;
        box-shadow: 0 4px 15px rgba(255, 122, 0, 0.3);
      }

      .login-prompt-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(255, 122, 0, 0.4);
      }

      .back-to-store {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: #666;
        text-decoration: none;
        font-size: 14px;
        transition: all 0.3s ease;
        padding: 8px 16px;
        border-radius: 40px;
      }

      .back-to-store:hover {
        color: #ff7a00;
        background: rgba(255, 122, 0, 0.1);
      }
      @media (max-width: 992px) {
        .form-layout-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="loginPrompt" class="login-prompt">
      <div class="login-prompt-card">
        <h1 style="color: #ff7a00; font-weight: bold">CR7</h1>
        <h2>Admin Access Required</h2>
        <p>Please login to access Admin Dashboard</p>
        <button
          class="login-prompt-btn"
          onclick="window.location.href = 'admin-login.html'"
        >
          Login as Admin →
        </button>
        <a href="index.html" class="back-to-store">← Back to Store</a>
      </div>
    </div>

    <div id="adminContent" style="display: none">
      <div class="admin-container">
        <div class="admin-header">
          <h1><i class="fas fa-crown"></i> CR7 Admin Dashboard</h1>
          <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-number" id="totalProducts">0</div>
            <div>Total Products</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="totalOrders">0</div>
            <div>Total Orders</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="totalCustomers">0</div>
            <div>Total Customers</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="totalSales">$0</div>
            <div>Total Sales</div>
          </div>
        </div>

        <div class="tabs">
          <button class="tab-btn active" data-tab="products">
            📦 Manage Products
          </button>
          <button class="tab-btn" data-tab="add">➕ Add New Product</button>
          <button class="tab-btn" data-tab="orders">📋 Orders</button>
          <button class="tab-btn" data-tab="customers">👥 Customers</button>
        </div>

        <div id="products-tab" class="tab-content active">
          <div class="products-table">
            <h3>📦 All Products</h3>
            <div id="productsList">Loading...</div>
          </div>
        </div>
        <div id="add-tab" class="tab-content">
          <div class="product-form">
            <div class="form-layout-grid">
              <div class="form-inputs-column">
                <div class="form-group">
                  <label>Product Title</label
                  ><input
                    type="text"
                    id="prodName"
                    placeholder="Product name"
                  />
                </div>
                <div class="form-group">
                  <label>Price (₹)</label
                  ><input type="number" id="prodPrice" placeholder="0.00" />
                </div>

                <div class="form-group">
                  <label>Initial Stock</label
                  ><input type="number" id="prodStock" placeholder="Quantity" />
                </div>
                <div class="form-group">
                  <label>Collection Category</label
                  ><select id="prodCategory">
                    <option value="men">Men's Apparel</option>
                    <option value="women">Women's Apparel</option>
                    <option value="accessories">Accessories</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Description</label
                  ><textarea id="prodDescription" rows="4"></textarea>
                </div>
              </div>
              <div class="form-media-column">
                <label>Product Image</label>
                <div class="image-upload-area" id="imageUploadArea">
                  <div class="upload-zone-content">Click to upload image</div>
                  <input
                    type="file"
                    id="productImage"
                    accept="image/*"
                    style="display: none"
                  />
                </div>
                <div id="imagePreview"></div>
                <div
                  id="uploadProgress"
                  class="upload-progress"
                  style="display: none"
                >
                  <div class="spinner"></div>
                  <span>Uploading...</span>
                </div>
              </div>
            </div>
            <button id="addProductBtn" class="submit-btn">
              ➕ Publish Product
            </button>
          </div>
        </div>
        <div id="orders-tab" class="tab-content">
          <div class="orders-table"><div id="ordersList"></div></div>
        </div>
        <div id="customers-tab" class="tab-content">
          <div class="orders-table"><div id="customersList"></div></div>
        </div>
      </div>
    </div>

    <div id="editModal" class="edit-modal">
      <div class="edit-modal-content">
        <h3>✏️ Edit Product</h3>
        <input type="hidden" id="editProductId" />
        <div class="form-group">
          <label>Product Name</label><input type="text" id="editName" />
        </div>
        <div class="form-group">
          <label>Price (₹)</label><input type="number" id="editPrice" />
        </div>
        <div class="form-group">
          <label>Stock</label><input type="number" id="editStock" />
        </div>
        <div class="form-group">
          <label>Category</label
          ><select id="editCategory">
            <option value="men">Men</option>
            <option value="women">Women</option>
            <option value="accessories">Accessories</option>
          </select>
        </div>
        <div class="form-group">
          <label>Description</label
          ><textarea id="editDescription" rows="2"></textarea>
        </div>
        <div class="modal-buttons">
          <button class="save-btn" id="saveEditBtn">💾 Save Changes</button
          ><button class="cancel-btn" id="cancelEditBtn">Cancel</button>
        </div>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import {
        getFirestore,
        collection,
        getDocs,
        addDoc,
        updateDoc,
        deleteDoc,
        doc,
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
      import {
        getStorage,
        ref,
        uploadBytes,
        getDownloadURL,
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBrXk_ltbvHPqbGnD_tIq8u9iNa_R3Bnlc",
        authDomain: "cr7-clothing-b4d5f.firebaseapp.com",
        projectId: "cr7-clothing-b4d5f",
        storageBucket: "cr7-clothing-b4d5f.firebasestorage.app",
        messagingSenderId: "671815729334",
        appId: "1:671815729334:web:d329c18205262c5221a617",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const storage = getStorage(app);

      let products = [],
        orders = [],
        customers = [];
      let selectedImageFile = null;

      // Check admin session
      if (localStorage.getItem("adminLoggedIn") === "true") {
        document.getElementById("loginPrompt").style.display = "none";
        document.getElementById("adminContent").style.display = "block";
        loadAllData();
      }

      // Image upload handler
      document
        .getElementById("imageUploadArea")
        ?.addEventListener("click", () =>
          document.getElementById("productImage").click(),
        );
      document
        .getElementById("productImage")
        ?.addEventListener("change", (e) => {
          if (e.target.files[0]) {
            selectedImageFile = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) =>
              (document.getElementById("imagePreview").innerHTML =
                `<img src="${ev.target.result}" style="max-width:200px; border-radius:8px">`);
            reader.readAsDataURL(selectedImageFile);
          }
        });

      async function uploadImage(file) {
        if (!file) return null;
        const progressDiv = document.getElementById("uploadProgress");
        if (progressDiv) progressDiv.style.display = "flex";
        try {
          const fileName = `products/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g, "_")}`;
          const snapshot = await uploadBytes(ref(storage, fileName), file);
          const url = await getDownloadURL(snapshot.ref);
          return url;
        } catch (error) {
          console.error("Upload error:", error);
          alert("Upload failed. Check Storage Rules.");
          return null;
        } finally {
          if (progressDiv) progressDiv.style.display = "none";
        }
      }

      async function loadAllData() {
        try {
          const productsSnap = await getDocs(collection(db, "products"));
          products = productsSnap.docs.map((d) => ({ id: d.id, ...d.data() }));
          const ordersSnap = await getDocs(collection(db, "orders"));
          orders = ordersSnap.docs.map((d) => ({ id: d.id, ...d.data() }));
          const customersSnap = await getDocs(collection(db, "customers"));
          customers = customersSnap.docs.map((d) => ({
            id: d.id,
            ...d.data(),
          }));

          displayProducts();
          displayOrders();
          displayCustomers();
          updateStats();
        } catch (error) {
          console.error("Load error:", error);
          alert("Error loading data: " + error.message);
        }
      }

      function displayProducts() {
        const container = document.getElementById("productsList");
        if (!products.length) {
          container.innerHTML =
            "<p style='text-align:center'>No products found.</p>";
          return;
        }
        let html = `<table><thead><tr><th>Image</th><th>Name</th><th>Price</th><th>Stock</th><th>Category</th><th>Actions</th></tr></thead><tbody>`;
        for (const p of products) {
          html += `<tr>
                    <td><img src="${p.image || "https://placehold.co/50x50"}" class="product-img-small"></td>
                    <td>${p.name || ""}</td>
                    <td>₹${p.price || 0}</td>
                    <td>${p.stock || 0}</td>
                    <td>${p.category || ""}</td>
                    <td><button class="edit-btn" onclick="window.editProduct('${p.id}')">✏️ Edit</button>
                        <button class="stock-btn" onclick="window.addStock('${p.id}', ${p.stock || 0})">📦 Add Stock</button>
                        <button class="delete-btn" onclick="window.deleteProduct('${p.id}')">🗑️ Delete</button></td>
                </tr>`;
        }
        html += `</tbody></table>`;
        container.innerHTML = html;
      }

      function displayOrders() {
        const container = document.getElementById("ordersList");
        if (!orders.length) {
          container.innerHTML =
            "<p style='text-align:center'>No orders yet.</p>";
          return;
        }
        let html = `<table><thead><tr><th>Order ID</th><th>Customer</th><th>Total</th><th>Status</th></tr></thead><tbody>`;
        for (const o of orders) {
          const customerName = o.customer?.name || o.customerName || "N/A";
          html += `<tr><td>${o.id.substring(0, 8)}</td><td>${customerName}</td><td>$${o.total || 0}</td><td>${o.orderStatus || o.status || "pending"}</td></tr>`;
        }
        html += `</tbody></table>`;
        container.innerHTML = html;
      }

      function displayCustomers() {
        const container = document.getElementById("customersList");
        if (!customers.length) {
          container.innerHTML =
            "<p style='text-align:center'>No customers yet.</p>";
          return;
        }
        let html = `<table><thead><tr><th>Name</th><th>Email</th><th>Phone</th></tr></thead><tbody>`;
        for (const c of customers) {
          html += `<tr><td>${c.fullName || c.name || "N/A"}</td><td>${c.email || "N/A"}</td><td>${c.phone || "N/A"}</td></tr>`;
        }
        html += `</tbody></table>`;
        container.innerHTML = html;
      }

      function updateStats() {
        document.getElementById("totalProducts").innerText = products.length;
        document.getElementById("totalOrders").innerText = orders.length;
        document.getElementById("totalCustomers").innerText = customers.length;
        const totalSales = orders.reduce((s, o) => s + (o.total || 0), 0);
        document.getElementById("totalSales").innerText = `₹${totalSales}`;
      }

      window.editProduct = (id) => {
        const product = products.find((p) => p.id === id);
        if (product) {
          document.getElementById("editProductId").value = id;
          document.getElementById("editName").value = product.name || "";
          document.getElementById("editPrice").value = product.price || 0;
          document.getElementById("editStock").value = product.stock || 0;
          document.getElementById("editCategory").value =
            product.category || "men";
          document.getElementById("editDescription").value =
            product.description || "";
          document.getElementById("editModal").style.display = "flex";
        }
      };

      window.addStock = async (id, currentStock) => {
        const addQty = prompt("Enter additional stock quantity:", "1");
        if (addQty && !isNaN(parseInt(addQty))) {
          try {
            await updateDoc(doc(db, "products", id), {
              stock: parseInt(currentStock) + parseInt(addQty),
            });
            alert("Stock updated!");
            await loadAllData();
          } catch (e) {
            alert("Error: " + e.message);
          }
        }
      };

      window.deleteProduct = async (id) => {
        if (confirm("Delete this product permanently?")) {
          try {
            await deleteDoc(doc(db, "products", id));
            alert("Product deleted");
            await loadAllData();
          } catch (e) {
            alert("Error: " + e.message);
          }
        }
      };

      async function addProduct() {
        const name = document.getElementById("prodName").value.trim();
        const price = parseFloat(document.getElementById("prodPrice").value);
        if (!name || isNaN(price)) {
          alert("Enter product name and price");
          return;
        }

        let imageUrl =
          "https://placehold.co/400x500/1a1a1a/ffffff?text=" +
          encodeURIComponent(name);
        if (selectedImageFile) {
          const uploadedUrl = await uploadImage(selectedImageFile);
          if (uploadedUrl) imageUrl = uploadedUrl;
        }

        try {
          await addDoc(collection(db, "products"), {
            name,
            price,
            stock: parseInt(document.getElementById("prodStock").value) || 0,
            category: document.getElementById("prodCategory").value,
            image: imageUrl,
            description: document.getElementById("prodDescription").value,
            createdAt: new Date(),
          });
          alert(`✅ "${name}" added!`);
          selectedImageFile = null;
          document.getElementById("imagePreview").innerHTML = "";
          document.getElementById("prodName").value = "";
          document.getElementById("prodPrice").value = "";
          document.getElementById("prodStock").value = "";
          document.getElementById("prodDescription").value = "";
          await loadAllData();
          switchTab("products");
        } catch (e) {
          alert("Error: " + e.message);
        }
      }

      async function saveEdit() {
        const id = document.getElementById("editProductId").value;
        if (!id) return;
        try {
          await updateDoc(doc(db, "products", id), {
            name: document.getElementById("editName").value.trim(),
            price: parseFloat(document.getElementById("editPrice").value),
            stock: parseInt(document.getElementById("editStock").value) || 0,
            category: document.getElementById("editCategory").value,
            description: document.getElementById("editDescription").value,
          });
          alert("Product updated!");
          document.getElementById("editModal").style.display = "none";
          await loadAllData();
        } catch (e) {
          alert("Update failed: " + e.message);
        }
      }

      document
        .getElementById("addProductBtn")
        ?.addEventListener("click", addProduct);
      document
        .getElementById("saveEditBtn")
        ?.addEventListener("click", saveEdit);
      document
        .getElementById("cancelEditBtn")
        ?.addEventListener(
          "click",
          () => (document.getElementById("editModal").style.display = "none"),
        );
      document.getElementById("logoutBtn")?.addEventListener("click", () => {
        localStorage.removeItem("adminLoggedIn");
        window.location.href = "admin-login.html";
      });

      function switchTab(tabName) {
        document
          .querySelectorAll(".tab-btn")
          .forEach((b) => b.classList.remove("active"));
        document
          .querySelectorAll(".tab-content")
          .forEach((t) => t.classList.remove("active"));
        document
          .querySelector(`[data-tab="${tabName}"]`)
          ?.classList.add("active");
        document.getElementById(`${tabName}-tab`)?.classList.add("active");
      }
      document
        .querySelectorAll(".tab-btn")
        .forEach((btn) =>
          btn.addEventListener("click", () => switchTab(btn.dataset.tab)),
        );

      window.switchTab = switchTab;
      window.loadAllData = loadAllData;
    </script>
  </body>
</html>
