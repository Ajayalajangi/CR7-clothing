<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - CR7 Clothing</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .login-container {
        background: #141414;
        border-radius: 32px;
        padding: 40px;
        width: 100%;
        max-width: 420px;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .logo {
        text-align: center;
        font-size: 36px;
        font-weight: 800;
        color: #ff7a00;
        margin-bottom: 30px;
      }
      h2 {
        color: white;
        margin-bottom: 30px;
        text-align: center;
        font-size: 24px;
      }
      .input-group {
        margin-bottom: 20px;
      }
      .input-group label {
        display: block;
        color: #aaa;
        font-size: 13px;
        margin-bottom: 8px;
      }
      .input-group input {
        width: 100%;
        padding: 14px;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 12px;
        color: white;
        font-size: 15px;
      }
      .input-group input:focus {
        outline: none;
        border-color: #ff7a00;
      }
      .login-btn {
        width: 100%;
        padding: 14px;
        background: #ff7a00;
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 10px;
      }
      .login-btn:hover {
        background: #e06600;
      }
      .error-msg {
        background: rgba(255, 68, 68, 0.1);
        border: 1px solid #ff4444;
        color: #ff4444;
        padding: 12px;
        border-radius: 12px;
        margin-bottom: 20px;
        text-align: center;
        display: none;
      }
      .back-link {
        text-align: center;
        margin-top: 20px;
      }
      .back-link a {
        color: #888;
        text-decoration: none;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="logo">CR7</div>
      <h2>Admin Login</h2>

      <div id="errorMsg" class="error-msg"></div>

      <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="admin@example.com" />
      </div>

      <div class="input-group">
        <label>Password</label>
        <input
          type="password"
          id="password"
          placeholder="Enter your password"
        />
      </div>

      <button id="loginBtn" class="login-btn">Login as Admin</button>

      <div class="back-link">
        <a href="index.html">← Back to Store</a>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import {
        getAuth,
        signInWithEmailAndPassword,
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBrXk_ltbvHPqbGnD_tIq8u9iNa_R3Bnlc",
        authDomain: "cr7-clothing-b4d5f.firebaseapp.com",
        projectId: "cr7-clothing-b4d5f",
        storageBucket: "cr7-clothing-b4d5f.firebasestorage.app",
        messagingSenderId: "671815729334",
        appId: "1:671815729334:web:d329c18205262c5221a617",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      // Admin emails list
      const adminEmails = ["ajayalajangi11@gmail.com", "admin@cr7clothing.com"];

      const loginBtn = document.getElementById("loginBtn");
      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");
      const errorMsg = document.getElementById("errorMsg");

      // Check if already logged in
      if (localStorage.getItem("adminLoggedIn") === "true") {
        window.location.href = "admin-dashboard.html";
      }

      loginBtn.addEventListener("click", async () => {
        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!email || !password) {
          errorMsg.textContent = "Please enter email and password";
          errorMsg.style.display = "block";
          return;
        }

        errorMsg.style.display = "none";
        loginBtn.textContent = "Verifying...";
        loginBtn.disabled = true;

        try {
          const userCredential = await signInWithEmailAndPassword(
            auth,
            email,
            password,
          );
          const user = userCredential.user;

          // Check if email is in admin list
          if (adminEmails.includes(email)) {
            // Store admin session
            localStorage.setItem("adminLoggedIn", "true");
            localStorage.setItem("adminEmail", email);
            localStorage.setItem("adminUid", user.uid);

            // Redirect to admin dashboard
            window.location.href = "admin-dashboard.html";
          } else {
            await auth.signOut();
            errorMsg.textContent =
              "Access Denied. You are not authorized as admin.";
            errorMsg.style.display = "block";
            loginBtn.textContent = "Login as Admin";
            loginBtn.disabled = false;
          }
        } catch (error) {
          let errorMessage = "Invalid email or password";
          if (error.code === "auth/user-not-found") {
            errorMessage = "No account found with this email";
          } else if (error.code === "auth/wrong-password") {
            errorMessage = "Wrong password";
          }
          errorMsg.textContent = errorMessage;
          errorMsg.style.display = "block";
          loginBtn.textContent = "Login as Admin";
          loginBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
