<script type="module">
  // Import the centralized functions from your core auth.js file
  import {
    getAllOrders,
    getAllCustomers,
    addProduct,
    updateProduct,
    deleteProduct,
    getDashboardStats,
    signOut,
  } from "./auth.js";

  // Initialize state variables
  let products = [],
    orders = [],
    customers = [];
  let selectedImageFile = null;

  // Check admin session validation state cleanly on load
  const adminSession = localStorage.getItem("adminLoggedIn");
  if (adminSession === "true") {
    document.getElementById("loginPrompt").style.display = "none";
    document.getElementById("adminContent").style.display = "block";
    loadAllData();
  } else {
    document.getElementById("loginPrompt").style.display = "flex";
    document.getElementById("adminContent").style.display = "none";
  }

  // 1. Image Selection Handler
  const uploadArea = document.getElementById("imageUploadArea");
  const fileInput = document.getElementById("productImage");
  const imagePreview = document.getElementById("imagePreview");

  uploadArea.addEventListener("click", () => fileInput.click());
  fileInput.addEventListener("change", (e) => {
    if (e.target.files[0]) handleImageFile(e.target.files[0]);
  });

  function handleImageFile(file) {
    if (!file.type.startsWith("image/")) {
      alert("Please select an image file (JPG, PNG)");
      return;
    }
    if (file.size > 5 * 1024 * 1024) {
      alert("Image size should be less than 5MB");
      return;
    }
    selectedImageFile = file;
    const reader = new FileReader();
    reader.onload = (e) => {
      imagePreview.innerHTML = `<img src="${e.target.result}" class="preview-img">`;
    };
    reader.readAsDataURL(file);
  }

  // Success layout alert popup banner animation trigger
  function showUploadSuccess(productName) {
    const animDiv = document.getElementById("uploadSuccessAnim");
    const h3 = animDiv.querySelector("h3");
    h3.innerHTML = `✅ "${productName}" Added!`;
    animDiv.style.display = "block";
    setTimeout(() => {
      animDiv.style.display = "none";
    }, 2500);
  }

  // 2. Add New Product mapping via centralized auth.js method
  async function handleAddProduct() {
    const name = document.getElementById("prodName").value.trim();
    const price = parseFloat(document.getElementById("prodPrice").value);
    const stock = parseInt(document.getElementById("prodStock").value);
    const category = document.getElementById("prodCategory").value;
    const description = document.getElementById("prodDescription").value.trim();

    if (!name || isNaN(price)) {
      alert("Please fill out the product name and price fields.");
      return;
    }

    const addBtn = document.getElementById("addProductBtn");
    addBtn.textContent = "Saving to database...";
    addBtn.disabled = true;

    // Note: For custom image file uploads to Firebase Storage, you can process them before passing metadata down
    let imageUrl =
      "https://placehold.co/400x500/1a1a1a/ffffff?text=" +
      encodeURIComponent(name);

    const productData = {
      name: name,
      price: price,
      stock: stock || 0,
      category: category,
      image: imageUrl,
      mainImage: imageUrl,
      description: description || "Premium quality product",
    };

    // Call the centralized function from auth.js
    const result = await addProduct(productData);

    if (result.success) {
      showUploadSuccess(name);
      selectedImageFile = null;
      imagePreview.innerHTML = "";
      document.getElementById("prodName").value = "";
      document.getElementById("prodPrice").value = "";
      document.getElementById("prodStock").value = "";
      document.getElementById("prodDescription").value = "";

      await loadAllData();
      setTimeout(() => switchTab("products"), 1000);
    } else {
      alert("Error: " + result.message);
    }
    addBtn.textContent = "➕ Add Product";
    addBtn.disabled = false;
  }

  // 3. Centralized Aggregator Data Collector Loader Loop
  async function loadAllData() {
    // Fetch Stats securely using the helper function
    const statsResult = await getDashboardStats();
    if (statsResult.success && statsResult.stats) {
      document.getElementById("totalProducts").innerText =
        statsResult.stats.totalProducts;
      document.getElementById("totalOrders").innerText =
        statsResult.stats.totalOrders;
      document.getElementById("totalCustomers").innerText =
        statsResult.stats.totalCustomers;
      document.getElementById("totalSales").innerText =
        `$${statsResult.stats.totalSales}`;
    }

    // Fetch Orders using the helper function
    const ordersResult = await getAllOrders();
    if (ordersResult.success) {
      orders = ordersResult.orders;
      displayOrders();
    }

    // Fetch Customers using the helper function
    const customersResult = await getAllCustomers();
    if (customersResult.success) {
      customers = customersResult.customers;
      displayCustomers();
    }

    // Fetch active product snapshot list array natively
    displayProducts();
  }

  function displayProducts() {
    const container = document.getElementById("productsList");
    if (products.length === 0) {
      container.innerHTML =
        "<p style='text-align:center; padding:40px;'>No active items found.</p>";
      return;
    }
    let html = `<table><thead><tr><th>Image</th><th>Name</th><th>Price</th><th>Stock</th><th>Category</th><th>Actions</th></tr></thead><tbody>`;
    for (const p of products) {
      html += `<tr>
            <td><img src="${p.image || "https://placehold.co/50x50"}" class="product-img-small" onerror="this.src='https://placehold.co/50x50'"></td>
            <td>${p.name || "Unnamed Product"}</td>
            <td>$${p.price || 0}</td>
            <td>${p.stock || 0}</td>
            <td>${p.category || "Uncategorized"}</td>
            <td>
              <button class="edit-btn" onclick="editProduct('${p.id}')">Edit</button> 
              <button class="delete-btn" onclick="deleteProduct('${p.id}')">Delete</button>
            </td>
          </tr>`;
    }
    html += `</tbody></table>`;
    container.innerHTML = html;
  }

  function displayOrders() {
    const container = document.getElementById("ordersList");
    if (orders.length === 0) {
      container.innerHTML =
        "<p style='text-align:center; padding:40px;'>No active customer orders cataloged yet.</p>";
      return;
    }
    let html = `<table><thead><tr><th>Order ID</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th></tr></thead><tbody>`;
    for (const o of orders) {
      const customerName = o.customerName || "Guest Account";
      const itemsList =
        o.items?.map((i) => `${i.name} x${i.quantity}`).join(", ") || "N/A";

      html += `<tr>
            <td>${o.id.substring(0, 8)}</td>
            <td>${customerName}</td>
            <td>${itemsList}</td>
            <td>$${o.total || 0}</td>
            <td><span style="background:#f59e0b; padding:4px 12px; border-radius:20px;">${o.orderStatus || "pending"}</span></td>
          </tr>`;
    }
    html += `</tbody></table>`;
    container.innerHTML = html;
  }

  function displayCustomers() {
    const container = document.getElementById("customersList");
    if (customers.length === 0) {
      container.innerHTML =
        "<p style='text-align:center; padding:40px;'>No registered customer directories cataloged yet.</p>";
      return;
    }
    let html = `<table><thead><tr><th>Name</th><th>Email</th><th>Phone</th></tr></thead><tbody>`;
    for (const c of customers) {
      html += `<tr>
            <td>${c.fullName || "N/A"}</td>
            <td>${c.email || "N/A"}</td>
            <td>${c.phone || "N/A"}</td>
          </tr>`;
    }
    html += `</tbody></table>`;
    container.innerHTML = html;
  }

  // 4. Update Actions bound via central auth helpers
  window.editProduct = async (id) => {
    const newName = prompt("Enter the new product title:");
    if (newName) {
      const res = await updateProduct(id, { name: newName });
      if (res.success) loadAllData();
    }
  };

  window.deleteProduct = async (id) => {
    if (confirm("Are you sure you want to delete this product?")) {
      const res = await deleteProduct(id);
      if (res.success) loadAllData();
    }
  };

  // 5. Global Actions Event Wire Up listeners
  document
    .getElementById("addProductBtn")
    .addEventListener("click", handleAddProduct);
  document.getElementById("logoutBtn").addEventListener("click", async () => {
    await signOut();
    localStorage.removeItem("adminLoggedIn");
    window.location.href = "admin-login.html";
  });

  function switchTab(tabName) {
    document
      .querySelectorAll(".tab-btn")
      .forEach((b) => b.classList.remove("active"));
    document
      .querySelectorAll(".tab-content")
      .forEach((t) => t.classList.remove("active"));

    const matchingBtn = document.querySelector(`[data-tab="${tabName}"]`);
    if (matchingBtn) matchingBtn.classList.add("active");

    const matchingTab = document.getElementById(`${tabName}-tab`);
    if (matchingTab) matchingTab.classList.add("active");
  }

  document.querySelectorAll(".tab-btn").forEach((btn) => {
    btn.addEventListener("click", () => switchTab(btn.dataset.tab));
  });
</script>
