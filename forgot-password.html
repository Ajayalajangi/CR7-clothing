<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - CR7 Clothing</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-logo">CR7</div>
        <h1 class="auth-title">Forgot Password?</h1>
        <p class="auth-subtitle">Enter your email to receive a reset link</p>

        <div id="errorMsg" class="auth-error" style="display: none"></div>
        <div id="successMsg" class="auth-success" style="display: none"></div>

        <input
          type="email"
          id="email"
          class="auth-input"
          placeholder="Email Address"
        />

        <button id="resetBtn" class="auth-btn">Send Reset Link</button>

        <div class="auth-link">
          Remember your password? <a href="customer-login.html">Login</a>
        </div>

        <div class="auth-link">
          <a href="/">← Back to Store</a>
        </div>
      </div>
    </div>

    <script type="module">
      import { sendResetOTP } from "./auth.js";

      const resetBtn = document.getElementById("resetBtn");
      const email = document.getElementById("email");
      const errorMsg = document.getElementById("errorMsg");
      const successMsg = document.getElementById("successMsg");

      resetBtn.addEventListener("click", async () => {
        const mail = email.value.trim();

        if (!mail) {
          errorMsg.textContent = "Please enter your email";
          errorMsg.style.display = "block";
          successMsg.style.display = "none";
          return;
        }

        errorMsg.style.display = "none";
        resetBtn.textContent = "Sending...";
        resetBtn.disabled = true;

        const result = await sendResetOTP(mail);

        if (result.success) {
          successMsg.textContent = result.message;
          successMsg.style.display = "block";

          setTimeout(() => {
            window.location.href = "customer-login.html";
          }, 3000);
        } else {
          errorMsg.textContent = result.message;
          errorMsg.style.display = "block";
          resetBtn.textContent = "Send Reset Link";
          resetBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
